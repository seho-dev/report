<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术日报 | Daily Tech Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #fafaf8;
            --muted: #6b6b6b;
            --light: #e8e8e5;
            --accent: #c9463d;
            --github: #238636;
            --hn: #ff6600;
            --twitter: #1da1f2;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 56px;
            padding-bottom: 32px;
            border-bottom: 2px solid var(--ink);
        }

        .date-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--muted);
            font-style: italic;
        }

        /* Section 区块 */
        .section {
            margin-bottom: 32px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: #fff;
            border: 1px solid var(--light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .section-header:hover {
            border-color: var(--ink);
        }

        .section-header.github { border-left: 4px solid var(--github); }
        .section-header.hn { border-left: 4px solid var(--hn); }
        .section-header.twitter { border-left: 4px solid var(--twitter); }

        .section-icon {
            font-size: 1.5rem;
        }

        .section-title {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 600;
            flex: 1;
        }

        .section-toggle {
            font-size: 0.8rem;
            color: var(--muted);
            margin-right: 12px;
        }

        .section-count {
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .section-content {
            display: none;
            background: #fff;
            border: 1px solid var(--light);
            border-top: none;
        }

        .section-content.expanded {
            display: block;
        }

        /* 文章列表 */
        .article {
            padding: 20px 24px;
            border-bottom: 1px solid var(--light);
            transition: background 0.2s;
        }

        .article:last-child {
            border-bottom: none;
        }

        .article:hover {
            background: #fafafa;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .article-title a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.2s;
        }

        .article-title a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .article-lang {
            background: var(--light);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .article-stars {
            color: var(--accent);
            font-weight: 500;
        }

        .article-summary {
            font-size: 0.875rem;
            color: var(--muted);
            line-height: 1.6;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
            background: #fff;
            border: 1px solid var(--light);
            border-top: none;
        }

        .pagination button {
            background: var(--light);
            border: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--ink);
            color: var(--paper);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--ink);
            color: var(--paper);
        }

        .pagination-info {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 48px 0 24px;
            margin-top: 48px;
            border-top: 1px solid var(--light);
            color: var(--muted);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .container { padding: 32px 16px; }
            .section-header { padding: 12px 16px; }
            .article { padding: 16px; }
            .pagination { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date-label">Daily Tech Report</div>
            <h1>技术日报</h1>
            <p class="tagline">每日技术资讯精选 · 洞悉行业脉搏</p>
        </header>

        <main id="content">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>© 2026 技术日报 · <a href="#">关于</a></p>
        </footer>
    </div>

    <script>
        const ITEMS_PER_PAGE = 10;
        let reportsData = {};
        let paginationState = {
            github: { page: 1 },
            hn: { page: 1 },
            twitter: { page: 1 }
        };
        
        const today = new Date();
        const dateKey = today.toISOString().split('T')[0];

        async function loadData() {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`data/${dateKey}.json`);
                if (response.ok) {
                    reportsData = await response.json();
                } else {
                    renderEmpty(container, dateKey);
                    return;
                }
            } catch (e) {
                renderEmpty(container, dateKey);
                return;
            }

            renderSections(container);
        }

        function renderSections(container) {
            const reports = reportsData.reports || [];
            
            const github = reports.filter(r => r.type === 'github');
            const hn = reports.filter(r => r.type === 'hn');
            const twitter = reports.filter(r => r.type === 'twitter');

            let html = '';
            html += renderSection('github', '🔰', 'GitHub Trending', github);
            html += renderSection('hn', '📰', 'Hacker News', hn);
            html += renderSection('twitter', '🐦', 'AI Twitter', twitter);

            if (!html) {
                renderEmpty(container, dateKey);
                return;
            }

            container.innerHTML = html;

            // 绑定展开/收起事件
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    if (e.target.classList.contains('page-btn')) return;
                    const content = header.nextElementSibling;
                    content.classList.toggle('expanded');
                    const toggle = header.querySelector('.section-toggle');
                    toggle.textContent = content.classList.contains('expanded') ? '▼ 点击收起' : '▶ 点击展开';
                });
            });

            // 默认展开
            document.querySelectorAll('.section-content').forEach(el => el.classList.add('expanded'));
            document.querySelectorAll('.section-toggle').forEach(el => el.textContent = '▼ 点击收起');
        }

        function renderSection(type, icon, title, articles) {
            if (!articles || articles.length === 0) return '';

            const totalPages = Math.ceil(articles.length / ITEMS_PER_PAGE);
            const currentPage = paginationState[type].page || 1;
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageArticles = articles.slice(start, end);

            const items = pageArticles.map((article, idx) => `
                <div class="article">
                    <div class="article-title">
                        <a href="${article.url || '#'}" target="_blank" rel="noopener">${article.title}</a>
                    </div>
                    <div class="article-meta">
                        <span>${start + idx + 1}</span>
                        ${article.stars ? `<span class="article-stars">⭐ ${article.stars}</span>` : ''}
                    </div>
                    ${article.summary ? `<p class="article-summary">${article.summary}</p>` : ''}
                </div>
            `).join('');

            let pagination = '';
            if (totalPages > 1) {
                pagination = `<div class="pagination">`;
                
                // 上一页
                pagination += `<button class="page-btn" onclick="changePage('${type}', ${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                
                // 页码
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                        pagination += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage('${type}', ${i})">${i}</button>`;
                    } else if (i === currentPage - 2 || i === currentPage + 2) {
                        pagination += `<span class="pagination-info">...</span>`;
                    }
                }
                
                // 下一页
                pagination += `<button class="page-btn" onclick="changePage('${type}', ${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
                
                pagination += `<span class="pagination-info">${currentPage}/${totalPages} 页</span>`;
                pagination += `</div>`;
            }

            return `
                <div class="section">
                    <div class="section-header ${type}">
                        <span class="section-icon">${icon}</span>
                        <span class="section-title">${title}</span>
                        <span class="section-count">${articles.length} 条</span>
                        <span class="section-toggle">▼ 点击收起</span>
                    </div>
                    <div class="section-content expanded">
                        ${items}
                        ${pagination}
                    </div>
                </div>
            `;
        }

        function changePage(type, page) {
            const reports = reportsData.reports || [];
            const articles = reports.filter(r => r.type === type);
            const totalPages = Math.ceil(articles.length / ITEMS_PER_PAGE);
            
            if (page < 1 || page > totalPages) return;
            
            paginationState[type].page = page;
            renderSections(document.getElementById('content'));
        }

        function renderEmpty(container, dateKey) {
            container.innerHTML = `
                <div class="empty">
                    <p>暂无数据</p>
                    <small>${dateKey}</small>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
