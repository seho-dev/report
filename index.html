<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术日报 | Daily Tech Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #fafaf8;
            --muted: #6b6b6b;
            --light: #e8e8e5;
            --accent: #c9463d;
            --github: #238636;
            --hn: #ff6600;
            --twitter: #1da1f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 56px;
            padding-bottom: 32px;
            border-bottom: 2px solid var(--ink);
        }

        .date-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        h1 {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 0.95rem;
            color: var(--muted);
            font-style: italic;
        }

        /* Section */
        .section {
            margin-bottom: 32px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: #fff;
            border: 1px solid var(--light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .section-header:hover {
            border-color: var(--ink);
        }

        .section-header.github { border-left: 4px solid var(--github); }
        .section-header.hn { border-left: 4px solid var(--hn); }
        .section-header.twitter { border-left: 4px solid var(--twitter); }

        .section-icon { font-size: 1.5rem; }
        .section-title {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 600;
            flex: 1;
        }

        .section-toggle {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .section-content {
            display: none;
            background: #fff;
            border: 1px solid var(--light);
            border-top: none;
        }

        .section-content.expanded { display: block; }

        /* 日期列表 */
        .date-item {
            padding: 20px 24px;
            border-bottom: 1px solid var(--light);
            transition: background 0.2s;
        }

        .date-item:last-child { border-bottom: none; }
        .date-item:hover { background: #fafafa; }

        .date-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .date-title {
            font-family: 'Noto Serif SC', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .date-title a {
            color: var(--ink);
            text-decoration: none;
        }

        .date-title a:hover { color: var(--accent); }

        .date-badge {
            font-size: 0.7rem;
            color: var(--muted);
            background: var(--light);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .article-list {
            margin-top: 12px;
            padding-left: 0;
            list-style: none;
        }

        .article-list li {
            padding: 6px 0;
            font-size: 0.9rem;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .article-list .num {
            color: var(--muted);
            font-size: 0.8rem;
            min-width: 20px;
        }

        .article-list a {
            color: var(--ink);
            text-decoration: none;
            transition: color 0.2s;
            flex: 1;
        }

        .article-list a:hover { color: var(--accent); text-decoration: underline; }

        .article-list .stars {
            color: var(--accent);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: #fafafa;
            border-top: 1px solid var(--light);
        }

        .pagination button {
            background: var(--light);
            border: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--ink);
            color: var(--paper);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: var(--ink);
            color: var(--paper);
        }

        .pagination-info {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0 12px;
        }

        footer {
            text-align: center;
            padding: 48px 0 24px;
            margin-top: 48px;
            border-top: 1px solid var(--light);
            color: var(--muted);
            font-size: 0.8rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        .loading, .empty { text-align: center; padding: 60px 20px; color: var(--muted); }

        @media (max-width: 640px) {
            .container { padding: 32px 16px; }
            .section-header { padding: 12px 16px; }
            .date-item { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date-label">Daily Tech Report</div>
            <h1>技术日报</h1>
            <p class="tagline">每日技术资讯精选 · 洞悉行业脉搏</p>
        </header>

        <main id="content">
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>© 2026 技术日报 · <a href="#">关于</a></p>
        </footer>
    </div>

    <script>
        const DAYS_PER_PAGE = 10;
        let allData = {};
        let paginationState = {
            github: { page: 1 },
            hn: { page: 1 },
            twitter: { page: 1 }
        };

        async function loadData() {
            const container = document.getElementById('content');
            container.innerHTML = '<div class="loading">加载最近30天数据...</div>';

            allData = { github: [], hn: [], twitter: [] };
            
            // 获取最近30天的数据
            const promises = [];
            for (let i = 0; i < 30; i++) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateKey = d.toISOString().split('T')[0];
                promises.push(fetch(`data/${dateKey}.json`).then(r => r.ok ? r.json() : null));
            }

            const results = await Promise.all(promises);
            
            results.forEach(data => {
                if (!data || !data.reports) return;
                data.reports.forEach(report => {
                    if (report.type === 'github') allData.github.push({ ...report, date: data.date });
                    else if (report.type === 'hn') allData.hn.push({ ...report, date: data.date });
                    else if (report.type === 'twitter') allData.twitter.push({ ...report, date: data.date });
                });
            });

            renderSections(container);
        }

        function renderSections(container) {
            let html = '';
            html += renderSection('github', '🔰', 'GitHub Trending', allData.github);
            html += renderSection('hn', '📰', 'Hacker News', allData.hn);
            html += renderSection('twitter', '🐦', 'AI Twitter', allData.twitter);

            if (!html) {
                container.innerHTML = '<div class="empty"><p>暂无数据</p></div>';
                return;
            }

            container.innerHTML = html;

            // 绑定展开/收起
            document.querySelectorAll('.section-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    if (e.target.classList.contains('page-btn')) return;
                    const content = header.nextElementSibling;
                    content.classList.toggle('expanded');
                    header.querySelector('.section-toggle').textContent = 
                        content.classList.contains('expanded') ? '▼ 点击收起' : '▶ 点击展开';
                });
            });

            document.querySelectorAll('.section-content').forEach(el => el.classList.add('expanded'));
            document.querySelectorAll('.section-toggle').forEach(el => el.textContent = '▼ 点击收起');
        }

        function renderSection(type, icon, title, articles) {
            if (!articles || articles.length === 0) return '';

            const totalPages = Math.ceil(articles.length / DAYS_PER_PAGE);
            const currentPage = paginationState[type].page || 1;
            const start = (currentPage - 1) * DAYS_PER_PAGE;
            const end = start + DAYS_PER_PAGE;
            const pageArticles = articles.slice(start, end);

            // 按日期分组
            const byDate = {};
            pageArticles.forEach(article => {
                const date = article.date || '未知日期';
                if (!byDate[date]) byDate[date] = [];
                byDate[date].push(article);
            });

            const dateItems = Object.entries(byDate).sort((a, b) => b[0].localeCompare(a[0])).map(([date, list]) => {
                const items = list.map((article, idx) => `
                    <li>
                        <span class="num">${idx + 1}.</span>
                        <a href="${article.url || '#'}" target="_blank" rel="noopener">${article.title}</a>
                        ${article.stars ? `<span class="stars">⭐ ${article.stars}</span>` : ''}
                    </li>
                `).join('');

                return `
                    <div class="date-item">
                        <div class="date-header">
                            <span class="date-title">${date}</span>
                            <span class="date-badge">${list.length} 条</span>
                        </div>
                        <ul class="article-list">${items}</ul>
                    </div>
                `;
            }).join('');

            let pagination = '';
            if (totalPages > 1) {
                pagination = `<div class="pagination">
                    <button class="page-btn" onclick="changePage('${type}', ${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
                
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                        pagination += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage('${type}', ${i})">${i}</button>`;
                    } else if (i === currentPage - 2 || i === currentPage + 2) {
                        pagination += `<span class="pagination-info">...</span>`;
                    }
                }
                
                pagination += `<button class="page-btn" onclick="changePage('${type}', ${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                    <span class="pagination-info">${currentPage}/${totalPages} 页</span>
                </div>`;
            }

            return `
                <div class="section">
                    <div class="section-header ${type}">
                        <span class="section-icon">${icon}</span>
                        <span class="section-title">${title}</span>
                        <span class="section-toggle">▼ 点击收起</span>
                    </div>
                    <div class="section-content expanded">
                        ${dateItems}
                        ${pagination}
                    </div>
                </div>
            `;
        }

        function changePage(type, page) {
            const articles = allData[type];
            const totalPages = Math.ceil(articles.length / DAYS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            paginationState[type].page = page;
            renderSections(document.getElementById('content'));
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
